<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETFIGHTER - Estatísticas BF</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeSB_CWfsuo2QcJR2OM7piQwo8HhZ4fRQ",
            authDomain: "taskmeapp-c4951.firebaseapp.com",
            databaseURL: "https://taskmeapp-c4951-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taskmeapp-c4951",
            storageBucket: "taskmeapp-c4951.firebasestorage.app",
            messagingSenderId: "965251565988",
            appId: "1:965251565988:web:0de5b7daa0f0566ebc5931",
            measurementId: "G-HTY2BGM9Y8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Dicionário de Traduções
        const i18n = {
            pt: {
                back: "Voltar a Palpites",
                selDay: "Dia selecionado:",
                today: "Hoje",
                loading: "A carregar linhas...",
                statsNormais: "Apostas Normais (Simples)",
                statsFSAll: "Fighter Selected (Todas)",
                statsFSLow: "Low FS",
                statsFSMed: "Medium FS",
                statsFSHigh: "High FS",
                roiDay: "ROI Dia",
                roiMonth: "ROI Mensal",
                avgOdd: "Odd média",
                profitDay: "Lucro Dia (u)",
                results: "Resultados",
                win: "G",
                loss: "P",
                pend: "Pnd",
                dateND: "Data N/D"
            },
            en: {
                back: "Back to Picks",
                selDay: "Selected day:",
                today: "Today",
                loading: "Loading lines...",
                statsNormais: "Normal Bets (Singles)",
                statsFSAll: "Fighter Selected (All)",
                statsFSLow: "Low FS",
                statsFSMed: "Medium FS",
                statsFSHigh: "High FS",
                roiDay: "Daily ROI",
                roiMonth: "Monthly ROI",
                avgOdd: "Avg Odd",
                profitDay: "Daily Profit (u)",
                results: "Results",
                win: "W",
                loss: "L",
                pend: "Pnd",
                dateND: "Date N/A"
            },
            nep: {
                back: "पिक्समा फर्कनुहोस्",
                selDay: "छानिएको दिन:",
                today: "आज",
                loading: "लोड हुँदैछ...",
                statsNormais: "सामान्य बाजी (एकल)",
                statsFSAll: "Fighter Selected (सबै)",
                statsFSLow: "Low FS",
                statsFSMed: "Medium FS",
                statsFSHigh: "High FS",
                roiDay: "दैनिक ROI",
                roiMonth: "मासिक ROI",
                avgOdd: "औसत Odd",
                profitDay: "दैनिक नाफा (u)",
                results: "नतिजाहरू",
                win: "W",
                loss: "L",
                pend: "Pnd",
                dateND: "मिति N/A"
            }
        };

        // Função de Deteção Universal de Idioma
        function detectarIdioma() {
            const urlParams = new URLSearchParams(window.location.search);
            let lang = urlParams.get('lang') || 
                       localStorage.getItem('idiomaPreferido') || 
                       localStorage.getItem('lang') || 
                       localStorage.getItem('idioma') || 'pt';
            return ['pt', 'en', 'nep'].includes(lang) ? lang : 'pt';
        }

        let currentLang = detectarIdioma();
        let t = i18n[currentLang];
        let dataSelecionada = hojeISO();
        let dadosJogosCache = {};

        function hojeISO() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        function atualizarIdioma(novoIdioma) {
            currentLang = novoIdioma;
            t = i18n[currentLang];
            localStorage.setItem('idiomaPreferido', novoIdioma);
            localStorage.setItem('lang', novoIdioma);
            document.documentElement.lang = novoIdioma;

            document.getElementById('txtVoltar').innerText = t.back;
            document.getElementById('txtDiaSel').innerText = t.selDay;
            document.getElementById('btnHoje').innerText = t.today;
            
            renderizarEstatisticas(dadosJogosCache);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const selectLang = document.getElementById('seletorIdioma');
            if (selectLang) {
                selectLang.value = currentLang;
                selectLang.addEventListener('change', (e) => atualizarIdioma(e.target.value));
            }

            atualizarIdioma(currentLang);

            const inp = document.getElementById('datePicker');
            const btnHoje = document.getElementById('btnHoje');

            if (inp) {
                inp.value = dataSelecionada;
                inp.addEventListener('change', (e) => {
                    dataSelecionada = e.target.value || hojeISO();
                    renderizarEstatisticas(dadosJogosCache);
                });
            }
            if (btnHoje) {
                btnHoje.addEventListener('click', () => {
                    dataSelecionada = hojeISO();
                    if(inp) inp.value = dataSelecionada;
                    renderizarEstatisticas(dadosJogosCache);
                });
            }
        });

        onValue(ref(db, "jogos"), (snapshot) => {
            dadosJogosCache = snapshot.val() || {};
            renderizarEstatisticas(dadosJogosCache);
        });

        function formatarDataDisplay(strData) {
            if(!strData) return t.dateND;
            const partes = strData.split('-');
            if(partes.length !== 3) return strData;
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function testarValueBetSingular(selecao, percentagem, oddStr) {
            const o = parseFloat(oddStr);
            if (isNaN(o) || o < 1.99) return null;
            const percDec = parseFloat(percentagem) / 100;
            if (isNaN(percDec) || percDec <= 0) return null;
            const probImplicita = 1 / o;
            const edge = percDec - probImplicita;
            
            if (edge > 0) {
                let confianca = Math.min((edge * 2) * 100, 95);
                let cat = '';
                if (confianca >= 0.1 && confianca <= 15.99) cat = 'low';
                else if (confianca >= 16 && confianca <= 26.99) cat = 'medium';
                else if (confianca >= 27) cat = 'high';
                else cat = 'none';

                return { selecao: selecao.toUpperCase(), edge: edge, odd: o, cat: cat };
            }
            return null;
        }

        function extrairMelhorValueBet(r1, r2) {
            if (r1 && r2) return (r1.edge > r2.edge) ? r1 : r2;
            return r1 || r2 || null;
        }

        function calcularValueBetOculta(previsao, oddFormulario, pctV1, pctX, pctV2, oddV1, oddX, oddV2) {
            if (!previsao) return null;
            let p = previsao.toLowerCase().trim();
            let r1 = null, r2 = null;

            if (p === '1x' || p === 'v1x' || p === '1x2') {
                r1 = testarValueBetSingular('1', pctV1, oddV1);
                r2 = testarValueBetSingular('X', pctX, oddX);
                return extrairMelhorValueBet(r1, r2);
            } else if (p === '2x' || p === 'v2x' || p === 'x2') {
                r1 = testarValueBetSingular('2', pctV2, oddV2);
                r2 = testarValueBetSingular('X', pctX, oddX);
                return extrairMelhorValueBet(r1, r2);
            } else if (p === '12' || p === 'v12') {
                r1 = testarValueBetSingular('1', pctV1, oddV1);
                r2 = testarValueBetSingular('2', pctV2, oddV2);
                return extrairMelhorValueBet(r1, r2);
            }

            let percSelecionada = 0, selecaoFinal = p;
            if (p === '1' || p === 'v1') { percSelecionada = pctV1; selecaoFinal = '1'; }
            else if (p === 'x' || p === 'vx') { percSelecionada = pctX; selecaoFinal = 'X'; }
            else if (p === '2' || p === 'v2') { percSelecionada = pctV2; selecaoFinal = '2'; }

            if (percSelecionada > 0) return testarValueBetSingular(selecaoFinal, percSelecionada, oddFormulario);
            return null;
        }

        function avaliarResultadoFinal(selecao, gA, gB) {
            if (isNaN(gA) || isNaN(gB)) return 'pendente';
            if (selecao === '1') return gA > gB ? 'ganha' : 'perdida';
            if (selecao === 'X') return gA === gB ? 'ganha' : 'perdida';
            if (selecao === '2') return gA < gB ? 'ganha' : 'perdida';
            return 'pendente';
        }

        function renderizarEstatisticas(dadosJogos) {
            const container = document.getElementById('statsContainer');
            document.getElementById('lblDataEscolhida').innerText = formatarDataDisplay(dataSelecionada);
            
            const anoMesSelecionado = dataSelecionada.substring(0, 7);
            const todosJogos = Object.values(dadosJogos).filter(j => j.arquivado);

            const s = {
                simples: { ganhas: 0, perdidas: 0, pendentes: 0, lucro: 0, stake: 0, somaOdds: 0, lucroMensal: 0, stakeMensal: 0 },
                fs_all:  { ganhas: 0, perdidas: 0, pendentes: 0, lucro: 0, stake: 0, somaOdds: 0, lucroMensal: 0, stakeMensal: 0 },
                fs_low:  { ganhas: 0, perdidas: 0, pendentes: 0, lucro: 0, stake: 0, somaOdds: 0, lucroMensal: 0, stakeMensal: 0 },
                fs_medium:{ ganhas: 0, perdidas: 0, pendentes: 0, lucro: 0, stake: 0, somaOdds: 0, lucroMensal: 0, stakeMensal: 0 },
                fs_high: { ganhas: 0, perdidas: 0, pendentes: 0, lucro: 0, stake: 0, somaOdds: 0, lucroMensal: 0, stakeMensal: 0 }
            };

            todosJogos.forEach(j => {
                const isDaily = j.dataEvento === dataSelecionada;
                const isMonthly = j.dataEvento && j.dataEvento.startsWith(anoMesSelecionado);
                if (!isDaily && !isMonthly) return;

                const oddSimples = parseFloat(j.oddSimples || j.odd || 0);
                if (j.estadoAposta === 'ganha') {
                    if (isDaily) { s.simples.ganhas++; s.simples.stake++; if(oddSimples>0) { s.simples.lucro += (oddSimples-1); s.simples.somaOdds += oddSimples; } }
                    if (isMonthly) { s.simples.stakeMensal++; if(oddSimples>0) s.simples.lucroMensal += (oddSimples-1); }
                } else if (j.estadoAposta === 'perdida') {
                    if (isDaily) { s.simples.perdidas++; s.simples.stake++; s.simples.lucro -= 1; if(oddSimples>0) s.simples.somaOdds += oddSimples; }
                    if (isMonthly) { s.simples.stakeMensal++; s.simples.lucroMensal -= 1; }
                } else {
                    if (isDaily) { s.simples.pendentes++; if(oddSimples>0) s.simples.somaOdds += oddSimples; }
                }

                let vbS = calcularValueBetOculta(j.previsaoSimples, j.oddSimples, j.pctV1, j.pctX, j.pctV2, j.oddV1, j.oddX, j.oddV2);
                let vbSug = calcularValueBetOculta(j.previsaoSugestao, j.oddSugestao, j.pctV1, j.pctX, j.pctV2, j.oddV1, j.oddX, j.oddV2);
                let vb = vbSug || vbS;

                if (vb) {
                    let estadoVB = 'pendente';
                    if (j.estadoAposta === 'ganha' || j.estadoAposta === 'perdida') {
                        const gA = parseInt(j.resGolosA); const gB = parseInt(j.resGolosB);
                        if (!isNaN(gA) && !isNaN(gB)) {
                            estadoVB = avaliarResultadoFinal(vb.selecao, gA, gB);
                        } else {
                            estadoVB = j.estadoAposta;
                        }
                    }

                    const subCats = ['fs_all', `fs_${vb.cat}`];
                    
                    subCats.forEach(c => {
                        if(!s[c]) return;
                        if (estadoVB === 'ganha') {
                            if (isDaily) { s[c].ganhas++; s[c].stake++; s[c].lucro += (vb.odd-1); s[c].somaOdds += vb.odd; }
                            if (isMonthly) { s[c].stakeMensal++; s[c].lucroMensal += (vb.odd-1); }
                        } else if (estadoVB === 'perdida') {
                            if (isDaily) { s[c].perdidas++; s[c].stake++; s[c].lucro -= 1; s[c].somaOdds += vb.odd; }
                            if (isMonthly) { s[c].stakeMensal++; s[c].lucroMensal -= 1; }
                        } else {
                            if (isDaily) { s[c].pendentes++; s[c].somaOdds += vb.odd; }
                        }
                    });
                }
            });

            function gerarLinhaHTML(title, color, statsObj) {
                const tot = statsObj.ganhas + statsObj.perdidas + statsObj.pendentes;
                const oddM = tot > 0 ? (statsObj.somaOdds / tot) : 0;
                const roi = statsObj.stake > 0 ? (statsObj.lucro / statsObj.stake) * 100 : 0;
                const roiM = statsObj.stakeMensal > 0 ? (statsObj.lucroMensal / statsObj.stakeMensal) * 100 : 0;
                
                const posD = statsObj.lucro >= 0; const posM = statsObj.lucroMensal >= 0;
                const corD = posD ? '#10b981' : '#ef4444'; const corM = posM ? '#10b981' : '#ef4444';

                return `
                    <div class="stats-category-block" style="border-left: 5px solid ${color};">
                        <h3 class="cat-title">
                            <span class="cat-dot" style="background: ${color};"></span>
                            ${title}
                        </h3>
                        <div class="stats-bar">
                            <div class="stat-card">
                                <div class="stat-label">${t.roiDay}</div>
                                <div class="stat-value" style="color:${corD}">${posD ? '▲' : '▼'} ${roi.toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">${t.roiMonth}</div>
                                <div class="stat-value" style="color:${corM}">${posM ? '▲' : '▼'} ${roiM.toFixed(1)}%</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">${t.avgOdd}</div>
                                <div class="stat-value">@${oddM.toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">${t.profitDay}</div>
                                <div class="stat-value" style="color:${corD}">${posD ? '+' : ''}${statsObj.lucro.toFixed(2)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">${t.results}</div>
                                <div class="stat-value pills-wrapper">
                                    <span class="pill-res win">${statsObj.ganhas}${t.win}</span>
                                    <span class="pill-res loss">${statsObj.perdidas}${t.loss}</span>
                                    <span class="pill-res pend">${statsObj.pendentes}${t.pend}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                ${gerarLinhaHTML(t.statsNormais, "#64748b", s.simples)}
                ${gerarLinhaHTML(t.statsFSAll, "#3b82f6", s.fs_all)}
                ${gerarLinhaHTML(t.statsFSLow, "#f97316", s.fs_low)}
                ${gerarLinhaHTML(t.statsFSMed, "#eab308", s.fs_medium)}
                ${gerarLinhaHTML(t.statsFSHigh, "#22c55e", s.fs_high)}
            `;
        }
    </script>

    <style>

        .container-master { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .stats-category-block { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px -2px rgba(0,0,0,0.05); }
        .cat-title { margin: 0 0 16px 0; font-size: 1.15rem; color: #0f172a; display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .cat-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }

        .stat-value { font-size: 1.2rem; font-weight: 900; color: #0f172a; }
        
        .pills-wrapper { display: flex; gap: 4px; margin-top: 4px; }
        .pill-res { font-size: 0.75rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; color: white; }
        .pill-res.win { background: #10b981; }
        .pill-res.loss { background: #ef4444; }
        .pill-res.pend { background: #64748b; }

        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .stats-bar .stat-card:last-child { grid-column: span 2; }
            .header-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
            .date-controls-bar { flex-direction: column; gap: 12px; align-items: stretch; }
            .date-controls-right { justify-content: space-between; }
        }
    </style>
</head>
