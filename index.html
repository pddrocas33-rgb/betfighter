        function formatarDataEvento(strData) {
            if(!strData) return "Data N/D";
            const partes = strData.split('-');
            if(partes.length !== 3) return strData;
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function formatarDataInsercao(timestamp) {
            if (!timestamp) return "";
            const data = new Date(timestamp);
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            const hora = String(data.getHours()).padStart(2, '0');
            const min = String(data.getMinutes()).padStart(2, '0');
            return `${dia}/${mes}/${ano} às ${hora}:${min}`;
        }

        function testarValueBetSingular(selecao, percentagem, oddStr) {
            const o = parseFloat(oddStr);
            if (isNaN(o) || o < 1.99) return null;
            const percDec = parseFloat(percentagem) / 100;
            if (isNaN(percDec) || percDec <= 0) return null;
            const probImplicita = 1 / o;
            const edge = percDec - probImplicita;
            if (edge > 0) {
                let confianca = Math.min((edge * 2) * 100, 95);
                let cor = '';
                if (confianca >= 0.1 && confianca <= 15.99) cor = '#f97316'; 
                else if (confianca >= 16 && confianca <= 26.99) cor = '#eab308'; 
                else if (confianca >= 27) cor = '#22c55e'; 
                else cor = '#64748b'; 
                
                return {
                    margem: (edge * 100).toFixed(2),
                    confianca: confianca.toFixed(0),
                    cor: cor,
                    selecao: selecao.toUpperCase(),
                    edge: edge 
                };
            }
            return null;
        }

        function extrairMelhorValueBet(r1, r2) {
            if (r1 && r2) return (r1.edge > r2.edge) ? r1 : r2;
            return r1 || r2 || null;
        }

        function calcularValueBetOculta(previsao, oddFormulario, pctV1, pctX, pctV2, oddV1, oddX, oddV2) {
            if (!previsao) return null;
            let p = previsao.toLowerCase().trim();
            let r1 = null; let r2 = null;

            if (p === '1x' || p === 'v1x' || p === '1x2') {
                r1 = testarValueBetSingular('1', pctV1, oddV1);
                r2 = testarValueBetSingular('X', pctX, oddX);
                return extrairMelhorValueBet(r1, r2);
            } else if (p === '2x' || p === 'v2x' || p === 'x2') {
                r1 = testarValueBetSingular('2', pctV2, oddV2);
                r2 = testarValueBetSingular('X', pctX, oddX);
                return extrairMelhorValueBet(r1, r2);
            } else if (p === '12' || p === 'v12') {
                r1 = testarValueBetSingular('1', pctV1, oddV1);
                r2 = testarValueBetSingular('2', pctV2, oddV2);
                return extrairMelhorValueBet(r1, r2);
            }

            let percSelecionada = 0; let selecaoFinal = p;
            if (p === '1' || p === 'v1') { percSelecionada = pctV1; selecaoFinal = '1'; }
            else if (p === 'x' || p === 'vx') { percSelecionada = pctX; selecaoFinal = 'X'; }
            else if (p === '2' || p === 'v2') { percSelecionada = pctV2; selecaoFinal = '2'; }

            if (percSelecionada > 0) return testarValueBetSingular(selecaoFinal, percSelecionada, oddFormulario);
            return null;
        }

        function avaliarPrevisaoIndividualmente(previsao, golosA, golosB, estadoGeral) {
            if (golosA === undefined || golosB === undefined || golosA === '' || golosB === '') return estadoGeral || 'pendente';
            const gA = parseInt(golosA, 10);
            const gB = parseInt(golosB, 10);
            if (isNaN(gA) || isNaN(gB)) return estadoGeral || 'pendente';

            const p = previsao.toLowerCase().trim();
            const totalGolos = gA + gB;

            if (p === 'v1' || p === '1') return gA > gB ? 'ganha' : 'perdida';
            if (p === 'vx' || p === 'x') return gA === gB ? 'ganha' : 'perdida';
            if (p === 'v2' || p === '2') return gA < gB ? 'ganha' : 'perdida';
            if (p === '1x' || p === 'v1x' || p === '12') {
                if (p === '12') return gA !== gB ? 'ganha' : 'perdida';
                return gA >= gB ? 'ganha' : 'perdida';
            }
            if (p === '2x' || p === 'v2x' || p === 'x2') return gA <= gB ? 'ganha' : 'perdida';

            const numMatch = p.match(/[\d.]+/);
            if (numMatch) {
                const linhaGolos = parseFloat(numMatch[0]);
                if (!isNaN(linhaGolos)) {
                    if (p.includes('over') || p.includes('o') || p.includes('acima') || p.includes('+')) return totalGolos > linhaGolos ? 'ganha' : 'perdida';
                    if (p.includes('under') || p.includes('u') || p.includes('abaixo') || p.includes('-')) return totalGolos < linhaGolos ? 'ganha' : 'perdida';
                }
            }
            return estadoGeral || 'pendente';
        }
