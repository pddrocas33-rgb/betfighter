        // ===== Estado global =====
        let dadosJogosCache = {};
        let dadosBannersCache = {}; 
        let dataSelecionada = hojeISO();
        let idiomaAtual = 'pt';

        function hojeISO() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const langSelect = document.getElementById('langSelect');
            if (langSelect) {
                // 1. Verificar se já existe uma escolha guardada no localStorage
                const idiomaSalvo = localStorage.getItem('idiomaPreferido');
                if (idiomaSalvo) {
                    idiomaAtual = idiomaSalvo;
                    langSelect.value = idiomaSalvo; // Sincroniza o seletor visualmente
                } else {
                    // Se não houver preferência, define 'pt' como inicial e guarda no localStorage
                    localStorage.setItem('idiomaPreferido', idiomaAtual);
                }

                // 2. Escutar as alterações de idioma feitas pelo utilizador
                langSelect.addEventListener('change', (e) => {
                    idiomaAtual = e.target.value;
                    
                    // Salva a nova preferência de idioma no localStorage
                    localStorage.setItem('idiomaPreferido', idiomaAtual);

                    atualizarBannersDinamicos();
                    atualizarTextosEstáticos();
                    renderizarListaArquivadosPublica(dadosJogosCache);
                });
            }
            
            // Força a tradução dos textos estáticos iniciais com base no idioma carregado
            atualizarTextosEstáticos();
            configurarProximoBanner();

            // Eventos do Modal Disclaimer
            const btnInfo = document.getElementById('btnInfo');
            const disclaimerModal = document.getElementById('disclaimerModal');
            const closeDisclaimer = document.getElementById('closeDisclaimer');

            if (btnInfo && disclaimerModal) {
                btnInfo.addEventListener('click', (e) => {
                    e.preventDefault();
                    disclaimerModal.classList.add('active');
                });
            }

            if (closeDisclaimer && disclaimerModal) {
                closeDisclaimer.addEventListener('click', () => {
                    disclaimerModal.classList.remove('active');
                });
                
                // Fecha ao clicar fora do conteúdo
                disclaimerModal.addEventListener('click', (e) => {
                    if (e.target === disclaimerModal) {
                        disclaimerModal.classList.remove('active');
                    }
                });
            }
        });

                if (b.topoImgEn) imagemTopo = b.topoImgEn;
                if (b.topoLinkEn) linkTopo = b.topoLinkEn;
                if (b.animadoImgEn) imagemPopup = b.animadoImgEn;
                if (b.animadoLinkEn) linkPopup = b.animadoLinkEn;
                if (b.esquerdoImgEn) imagemLateralDesktop = b.esquerdoImgEn;
                if (b.esquerdoMobImgEn) imagemLateralMobile = b.esquerdoMobImgEn;
                if (b.esquerdoLinkEn) linkLateral = b.esquerdoLinkEn;
                if (b.direitoImgEn) imagemDireitaDesktop = b.direitoImgEn;
                if (b.direitoLinkEn) linkDireito = b.direitoLinkEn;
            } else if (idiomaAtual === 'nep') {
                if (b.topoImgNep) imagemTopo = b.topoImgNep;
                if (b.topoLinkNep) linkTopo = b.topoLinkNep;
                if (b.animadoImgNep) imagemPopup = b.animadoImgNep;
                if (b.animadoLinkNep) linkPopup = b.animadoLinkNep;
                if (b.esquerdoImgNep) imagemLateralDesktop = b.esquerdoImgNep;
                if (b.esquerdoMobImgNep) imagemLateralMobile = b.esquerdoMobImgNep;
                if (b.esquerdoLinkNep) linkLateral = b.esquerdoLinkNep;
                if (b.direitoImgNep) imagemDireitaDesktop = b.direitoImgNep;
                if (b.direitoLinkNep) linkDireito = b.direitoLinkNep;
            }

            // Aplicar ao Banner do Topo
            const topoImgEl = document.getElementById('imgBannerTopo');
            const topoAnchorEl = document.getElementById('anchorBannerTopo');
            if (topoImgEl) topoImgEl.src = imagemTopo;
            if (topoAnchorEl) topoAnchorEl.href = linkTopo;

            // Aplicar ao Popup Estático/Animado do fundo
            const popupImg = document.querySelector('#animatedPopupBanner .popup-banner-anchor img');
            const popupAnchor = document.querySelector('#animatedPopupBanner .popup-banner-anchor');
            if (popupImg) popupImg.src = imagemPopup;
            if (popupAnchor) popupAnchor.href = linkPopup;

            // Aplicar à Sidebar Lateral Esquerda
            const sidebarAnchor = document.querySelector('.sidebar-banner.banner-pos-left');
            if (sidebarAnchor) {
                sidebarAnchor.href = linkLateral;
                const imgDesk = sidebarAnchor.querySelector('.img-desktop');
                const imgMob = sidebarAnchor.querySelector('.img-mobile');
                if (imgDesk) imgDesk.src = imagemLateralDesktop;
                if (imgMob) imgMob.src = imagemLateralMobile;
            }

            // Aplicar à Sidebar Lateral Direita
            const sidebarDireitaAnchor = document.querySelector('.sidebar-banner.banner-pos-right');
            if (sidebarDireitaAnchor) {
                sidebarDireitaAnchor.href = linkDireito;
                const imgDeskDir = sidebarDireitaAnchor.querySelector('.img-desktop');
                const imgMobDir = sidebarDireitaAnchor.querySelector('.img-mobile');
                if (imgDeskDir) imgDeskDir.src = imagemDireitaDesktop;
                if (imgMobDir) imgMobDir.src = imagemDireitaMobile;

                infoBody.innerHTML = `

                    <p>${t.infoPhase}</p>
                    <p>${t.infoPartners}</p>
                    <div class="disclaimer-email-box">
                        ${t.infoContact} <a href="mailto:suporte@bet-fighter.com">suporte@bet-fighter.com</a>
                    </div>
                `;
            }
        }

        let tempoEsperaAtual = 60000; 

        function configurarProximoBanner() {
            setTimeout(() => {
                mostrarBannerAnimado();
                tempoEsperaAtual = tempoEsperaAtual * 2;
            }, tempoEsperaAtual);
        }

        function mostrarBannerAnimado() {
            const popup = document.getElementById('animatedPopupBanner');
            if(popup) {
                popup.classList.add('active');
            }
        }

        window.fecharBannerAnimado = function() {
            const popup = document.getElementById('animatedPopupBanner');
            if(popup) {
                popup.classList.remove('active');
                configurarProximoBanner();
            }
        }

        // Escuta jogos do Firebase
        onValue(ref(db, "jogos"), (snapshot) => {
            const dadosJogos = snapshot.val() || {};
            dadosJogosCache = dadosJogos;
            renderizarListaArquivadosPublica(dadosJogos);
        });

        // Escuta em tempo real do nó "banners"
        onValue(ref(db, "banners"), (snapshot) => {
            dadosBannersCache = snapshot.val() || {};
            atualizarBannersDinamicos();
        });

        function formatarDataEvento(strData) {
            const lang = traducoes[idiomaAtual];
            if(!strData) return lang.dataNd;
            const partes = strData.split('-');
            if(partes.length !== 3) return strData;
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function formatarDataInsercao(timestamp) {
            if (!timestamp) return "";
            const lang = traducoes[idiomaAtual];
            const data = new Date(timestamp);
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            const hora = String(data.getHours()).padStart(2, '0');
            const min = String(data.getMinutes()).padStart(2, '0');
            return `${dia}/${mes}/${ano} ${lang.as} ${hora}:${min}`;
        }

        function renderizarListaArquivadosPublica(dadosJogos) {
            const containerPublico = document.getElementById('publicGameViewer');
            const lang = traducoes[idiomaAtual];
            
            const todosJogosArr = Object.keys(dadosJogos).map(key => ({ key, ...dadosJogos[key] }));

            const jogosArquivados = todosJogosArr
                .filter(j => j.arquivado && j.dataEvento === dataSelecionada)
                .sort((a, b) => (b.criadoEm || 0) - (a.criadoEm || 0));

            let ganhas = 0, perdidas = 0, pendentes = 0;
            let somaOddsGanhas = 0;
            let lucro = 0, stakeTotal = 0;
            
            jogosArquivados.forEach(j => {
                const odd = parseFloat(j.odd);
                if (j.estadoAposta === 'ganha') {
                    ganhas++;
                    stakeTotal += 1;
                    if (!isNaN(odd) && odd > 0) {
                        lucro += (odd - 1);
                        somaOddsGanhas += odd;
                    }
                } else if (j.estadoAposta === 'perdida') {
                    perdidas++;
                    stakeTotal += 1;
                    lucro -= 1;
                } else {
                    pendentes++;
                }
            });
            const totalEventos = jogosArquivados.length;
            const oddMedia = totalEventos > 0 ? (somaOddsGanhas / totalEventos) : 0;
            const roi = stakeTotal > 0 ? (lucro / stakeTotal) * 100 : 0;
            const positivo = lucro >= 0;
            const corGanho = positivo ? '#10b981' : '#ef4444';
            const setaGanho = positivo ? '▲' : '▼';

            const anoMesSelecionado = dataSelecionada.substring(0, 7); 
            let lucroMensal = 0;
            let stakeMensal = 0;

            todosJogosArr.forEach(j => {
                if (j.arquivado && j.dataEvento && j.dataEvento.startsWith(anoMesSelecionado)) {
                    const odd = parseFloat(j.odd);
                    if (j.estadoAposta === 'ganha') {
                        stakeMensal += 1;
                        if (!isNaN(odd) && odd > 0) {
                            lucroMensal += (odd - 1);
                        }
                    } else if (j.estadoAposta === 'perdida') {
                        stakeMensal += 1;
                        lucroMensal -= 1;
                    }
                }
            });

            const roiMensal = stakeMensal > 0 ? (lucroMensal / stakeMensal) * 100 : 0;
            const positivoMensal = lucroMensal >= 0;
            const corGanhoMensal = positivoMensal ? '#10b981' : '#ef4444';
            const setaGanhoMensal = positivoMensal ? '▲' : '▼';

            const statsBar = `
                <div class="stats-bar">
                    <div class="stat-card">
                        <div class="stat-label">${lang.roiDia}</div>
                        <div class="stat-value" style="color:${corGanho}">${setaGanho} ${roi.toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${lang.roiMensal}</div>
                        <div class="stat-value" style="color:${corGanhoMensal}">${setaGanhoMensal} ${roiMensal.toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${lang.oddMedia}</div>
                        <div class="stat-value">@${oddMedia.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${lang.lucroDia}</div>
                        <div class="stat-value" style="color:${corGanho}">${positivo ? '+' : ''}${lucro.toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${lang.resultados}</div>
                        <div class="stat-value" style="font-size:0.85rem;">
                            <span style="color:#10b981">${ganhas}G</span> ·
                            <span style="color:#ef4444">${perdidas}P</span> ·
                            <span style="color:#94a3b8">${pendentes}Pend</span>
                        </div>
                    </div>
                </div>
            `;

            const gruposPorLiga = {};
            jogosArquivados.forEach(j => {
                const nomeLiga = (j.liga || lang.outrasLigas).toUpperCase().trim();
                if (!gruposPorLiga[nomeLiga]) {
                    gruposPorLiga[nomeLiga] = [];
                }
                gruposPorLiga[nomeLiga].push(j);
            });

            // Gerar dados dinâmicos locais das sidebars
            const b = dadosBannersCache;

            // Esquerdo
            let imagemLateralDesktop = b.esquerdoImg || "imagens/banner_esquerdo.png";
            let imagemLateralMobile = b.esquerdoMobImg || "imagens/banner_esquerdo_mobile.png";
            let linkLateral = b.esquerdoLink || "https://22bet4me.com?bf=9c0edc58d75d4_464354407";

            // Direito
            let imagemDireitaDesktop = b.direitoImg || "imagens/banner_esquerdo.png"; 
            let imagemDireitaMobile = b.esquerdoMobImg || "imagens/banner_esquerdo_mobile.png";
            let linkDireito = b.direitoLink || "https://22bet4me.com?bf=9c0edc58d75d4_464354407";

            if (idiomaAtual === 'en') {
                if (b.esquerdoImgEn) imagemLateralDesktop = b.esquerdoImgEn;
                if (b.esquerdoMobImgEn) imagemLateralMobile = b.esquerdoMobImgEn;
                if (b.esquerdoLinkEn) linkLateral = b.esquerdoLinkEn;
                if (b.direitoImgEn) imagemDireitaDesktop = b.direitoImgEn;
                if (b.direitoLinkEn) linkDireito = b.direitoLinkEn;
            } else if (idiomaAtual === 'nep') {
                if (b.esquerdoImgNep) imagemLateralDesktop = b.esquerdoImgNep;
                if (b.esquerdoMobImgNep) imagemLateralMobile = b.esquerdoMobImgNep;
                if (b.esquerdoLinkNep) linkLateral = b.esquerdoLinkNep;
                if (b.direitoImgNep) imagemDireitaDesktop = b.direitoImgNep;
                if (b.direitoLinkNep) linkDireito = b.direitoLinkNep;
            }

            let htmlLista = `
                <div class="brand-title-container">
                    <h1 class="brand-title"><span class="brand-green">BET</span><span class="brand-black">FIGHTER</span></h1>
                    <div class="brand-subtitle">${lang.subtitle}</div>
                </div>

                <!-- BANNER GRANDE DO TOPO -->
                <div class="top-hero-banner-container">
                    <a href="mailto:suporte@bet-fighter.com" id="anchorBannerTopo" target="_blank" class="topo-banner-link">
                        <img src="imagens/banner_topo_novo.png" id="imgBannerTopo" alt="Betfighter Banner">
                    </a>
                </div>

                <div class="date-controls-bar">
                    <div class="date-controls-left">
                        <span class="date-controls-title">${lang.diaSelecionado} <strong>${formatarDataEvento(dataSelecionada)}</strong></span>
                    </div>
                    <div class="date-controls-right">
                        <button id="btnHoje" class="btn-hoje" type="button">${lang.hoje}</button>
                        <input id="datePicker" type="date" class="date-input" />
                    </div>
                </div>

                ${statsBar}

                <div class="main-layout-wrapper">
                    <!-- BANNER ESQUERDO -->
                    <a href="${linkLateral}" target="_blank" class="sidebar-banner banner-pos-left">
                        <img src="${imagemLateralDesktop}" alt="" class="img-desktop">
                        <img src="${imagemLateralMobile}" alt="" class="img-mobile">
                    </a>

                    <div class="games-center-column">
            `;

            const ligasDisponiveis = Object.keys(gruposPorLiga);

            if (ligasDisponiveis.length === 0) {
                htmlLista += `
                    <div class="no-games-fallback">
                        ${lang.nenhumJogo} ${formatarDataEvento(dataSelecionada)}.
                    </div>
                `;
            } else {
                ligasDisponiveis.forEach(nomeLiga => {
                    htmlLista += `
                        <div class="liga-section-container">
                            <div class="liga-header-title">🏆 ${nomeLiga}</div>
                            <div class="liga-games-wrapper">
                    `;

                    gruposPorLiga[nomeLiga].forEach(j => {
                        const valGolasA = j.resGolosA !== undefined ? j.resGolosA : '';
                        const valGolasB = j.resGolosB !== undefined ? j.resGolosB : '';
                        const valOdd = j.odd !== undefined ? j.odd : '';
                        
                        const dataJogoFormatada = formatarDataEvento(j.dataEvento);
                        const dataInsercaoFormatada = formatarDataInsercao(j.criadoEm);

                        const resultadoFinalStr = (valGolasA !== '' && valGolasB !== '') ? `${valGolasA} - ${valGolasB}` : 'vs';
                        
                        let previsaoStr = 'N/A';
                        if (j.previsao) {
                            if (j.previsao.toLowerCase() === 'ganha') previsaoStr = lang.ganha;
                            else if (j.previsao.toLowerCase() === 'perdida') previsaoStr = lang.perdida;
                            else if (j.previsao.toLowerCase() === 'pendente') previsaoStr = lang.pendente;
                            else previsaoStr = j.previsao; 
                        }
                        
                        let corPrevisaoClass = 'pendente';
                        if(j.estadoAposta === 'ganha') corPrevisaoClass = 'ganha';
                        if(j.estadoAposta === 'perdida') corPrevisaoClass = 'perdida';

                        let oddElement = '';
                        if (valOdd === '' || parseFloat(valOdd) === 0) {
                            oddElement = `
                                <a href="https://22bet4me.com?bf=9c0edc58d75d4_464354407" target="_blank" class="affiliate-odd-row">
                                    ${lang.bonus}
                                </a>
                            `;
                        } else {
                            oddElement = `<span class="pure-text-badge">@${Number(valOdd).toFixed(2)}</span>`;
                        }

                        htmlLista += `
                            <div class="public-archive-row ${j.estadoAposta || 'pendente'}">
                                
                                <div class="row-main-info">
                                    <div class="row-top-metadata">
                                        <span class="date-badge-top">📅 ${dataJogoFormatada}</span>
                                    </div>
                                    
                                    <div class="row-teams-line">
                                        <span class="team-name">${j.equipaA}</span>
                                        <span class="score-badge">${resultadoFinalStr}</span>
                                        <span class="team-name">${j.equipaB}</span>
                                    </div>

                                    <div class="row-footer-metadata">
                                        ${lang.inserido}: ${dataInsercaoFormatada}
                                    </div>
                                </div>

                                <div class="row-actions-zone">
                                    <div class="prediction-pill-wrapper">
                                        <span class="row-label">${lang.palpite}</span>
                                        <span class="quadrado-previsao ${corPrevisaoClass}">${previsaoStr}</span>
                                    </div>
                                    <div class="odd-pill-wrapper">
                                        <span class="row-label">${lang.cotacao}</span>
                                        ${oddElement}
                                    </div>
                                </div>

                            </div>
                        `;
                    });

                    htmlLista += `
                            </div>
                        </div>
                    `;
                });
            }

            htmlLista += `
                    </div>

                    <!-- BANNER DIREITO SINCRONIZADO COM A GESTÃO -->
                    <a href="${linkDireito}" target="_blank" class="sidebar-banner banner-pos-right">
                        <img src="${imagemDireitaDesktop}" alt="" class="img-desktop">
                        <img src="${imagemDireitaMobile}" alt="" class="img-mobile">
                    </a>
                </div>
            `;

            containerPublico.innerHTML = htmlLista;

            // Re-vincular eventos após renderização
            const inp = document.getElementById('datePicker');
            if (inp) {
                inp.value = dataSelecionada;
                inp.addEventListener('change', (e) => {

            if (btnHoje) {
