        // ===== CÁLCULO OCULTO DE VALUED BETS =====
        function calcularValueBetOculta(previsao, odd, pctV1, pctX, pctV2) {
            if (!previsao || !odd) return null;
            const o = parseFloat(odd);
            
            // ===== A ODD TEM QUE SER A PARTIR DE 1.99 =====
            if (isNaN(o) || o < 1.99) return null;

            let p1 = parseFloat(pctV1) || 0;
            let px = parseFloat(pctX) || 0;
            let p2 = parseFloat(pctV2) || 0;
            let percSelecionada = 0;
            
            let p = previsao.toLowerCase().trim();
            
            if (p === '1' || p === 'v1') percSelecionada = p1;
            else if (p === 'x' || p === 'vx') percSelecionada = px;
            else if (p === '2' || p === 'v2') percSelecionada = p2;
            else if (p === '1x' || p === 'v1x' || p === '1x2') percSelecionada = Math.max(p1, px);
            else if (p === '2x' || p === 'v2x' || p === 'x2') percSelecionada = Math.max(p2, px);
            else if (p === '12' || p === 'v12') percSelecionada = Math.max(p1, p2);
            
            if (percSelecionada <= 0) return null;
            
            const percDec = percSelecionada / 100;
            const probImplicita = 1 / o;
            const edge = percDec - probImplicita;
            
            if (edge > 0) {
                let confianca = Math.min((edge * 2) * 100, 95);
                let cor = '';
                
                if (confianca >= 0.1 && confianca <= 15.99) {
                    cor = '#f97316'; 
                } else if (confianca >= 16 && confianca <= 26.99) {
                    cor = '#eab308'; 
                } else if (confianca >= 27) {
                    cor = '#22c55e'; 
                } else {
                    cor = '#64748b'; 
                }
                
                return {
                    margem: (edge * 100).toFixed(2),
                    confianca: confianca.toFixed(0),
                    cor: cor,
                    selecao: p.toUpperCase()
                };
            }
            return null;
        }

        function avaliarPrevisaoIndividualmente(previsao, golosA, golosB, estadoGeral) {
            if (golosA === undefined || golosB === undefined || golosA === '' || golosB === '') {
                return estadoGeral || 'pendente';
            }
            const gA = parseInt(golosA, 10);
            const gB = parseInt(golosB, 10);
            if (isNaN(gA) || isNaN(gB)) return estadoGeral || 'pendente';

            const p = previsao.toLowerCase().trim();
            const totalGolos = gA + gB;

            if (p === 'v1' || p === '1') return gA > gB ? 'ganha' : 'perdida';
            if (p === 'vx' || p === 'x') return gA === gB ? 'ganha' : 'perdida';
            if (p === 'v2' || p === '2') return gA < gB ? 'ganha' : 'perdida';
            if (p === '1x' || p === 'v1x' || p === '12') {
                if (p === '12') return gA !== gB ? 'ganha' : 'perdida';
                return gA >= gB ? 'ganha' : 'perdida';
            }
            if (p === '2x' || p === 'v2x' || p === 'x2') return gA <= gB ? 'ganha' : 'perdida';

            const numMatch = p.match(/[\d.]+/);
            if (numMatch) {
                const linhaGolos = parseFloat(numMatch[0]);
                if (!isNaN(linhaGolos)) {
                    if (p.includes('over') || p.includes('o') || p.includes('acima') || p.includes('+')) {
                        return totalGolos > linhaGolos ? 'ganha' : 'perdida';
                    }
                    if (p.includes('under') || p.includes('u') || p.includes('abaixo') || p.includes('-')) {
                        return totalGolos < linhaGolos ? 'ganha' : 'perdida';
                    }
                }
            }

            return estadoGeral || 'pendente';
        }
