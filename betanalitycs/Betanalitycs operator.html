        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeSB_CWfsuo2QcJR2OM7piQwo8HhZ4fRQ",
            authDomain: "taskmeapp-c4951.firebaseapp.com",
            databaseURL: "https://taskmeapp-c4951-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "taskmeapp-c4951",
            storageBucket: "taskmeapp-c4951.firebasestorage.app",
            messagingSenderId: "965251565988",
            appId: "1:965251565988:web:0de5b7daa0f0566ebc5931",
            measurementId: "G-HTY2BGM9Y8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbPush = push;
        window.dbSet = set;
        window.dbGet = get;
        window.dbChild = child;

        onValue(ref(db, "jogos"), (snapshot) => {
            const dados = snapshot.val() || {};
            window.dadosJogosGlobais = dados;
            
            let ligasSet = new Set();
            Object.keys(dados).forEach(key => {
                if(dados[key].liga) ligasSet.add(dados[key].liga);
            });
            window.atualizarBuscaAutomaticaLigas(ligasSet);
            
            if(window.operadorLogado) {
                window.atualizarListasInterface();
            }
        });

            lblTabelaGolos: "Golos M/S", lblTabelaTotais: "V/E/D Totais", lblTabelaLocal: "V/E/D Casa", lblTabelaVisitante: "V/E/D Fora",

            lblOpActivo: "Active Operator:", btnLogoutBtn: "Logout 🚪",
            txtEdicaoAlerta: "⚠️ Edit Mode Active! You are correcting an old game.", btnCancelarEdicao: "Cancel",
            lblLiga: "🏆 League / Competition Name", lblDataEvento: "📅 Event Date", txtEquipaACasa: "🏠 Team A (Home)",

    // Função utilitária para formatar timestamp Unix para string dd/mm/aaaa hh:mm
    function formatarTimestamp(ts) {
        if (!ts) return "";
        const d = new Date(ts);
        const dia = String(d.getDate()).padStart(2, '0');
        const mes = String(d.getMonth() + 1).padStart(2, '0');
        const ano = d.getFullYear();
        const hora = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        return `${dia}/${mes}/${ano} ${hora}:${min}`;
    }

    // Função utilitária para converter data AAAA-MM-DD do input para dd/mm/aaaa visível
    function formatarDataString(strData) {
        if(!strData) return linguas[window.idiomaAtual].lblSemData;
        const partes = strData.split('-');
        if(partes.length !== 3) return strData;
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function mudarIdioma(lang) {
        window.idiomaAtual = lang;
        document.getElementById('btnLangPt').classList.toggle('active', lang === 'pt');
        document.getElementById('btnLangEn').classList.toggle('active', lang === 'en');

        // Traduzir elementos estáticos
        Object.keys(linguas[lang]).forEach(id => {
            const elem = document.getElementById(id);
            if(elem && !id.startsWith('btnSalvar') && !id.startsWith('tabBtn')) {
                if(elem.tagName === 'INPUT') elem.placeholder = linguas[lang][id];
                else elem.innerHTML = linguas[lang][id];
            }
        });

        // Corrigir estados de botões de submissão
        const keyExistente = document.getElementById('editGameKey').value;
        document.getElementById('btnSalvarPrincipal').innerText = keyExistente ? linguas[lang].btnSalvarEdit : linguas[lang].btnSalvarPrincipal;

        if(window.operadorLogado) window.atualizarListasInterface();
    }

    function alternarAba(idAba) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${idAba}`).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function executarLoginNaNuvem() {
        const userInput = document.getElementById('loginUser').value.trim().toLowerCase();
        const passInput = document.getElementById('loginPass').value.trim();
        const errLabel = document.getElementById('loginError');

        if(!userInput || !passInput) return;

        window.dbGet(window.dbChild(window.dbRef(window.db), `operadores/${userInput}`)).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().password === passInput) {
                window.operadorLogado = { username: userInput, nome: snapshot.val().nome || userInput };
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('lblNomeOperador').innerText = window.operadorLogado.nome;
                errLabel.classList.add('hidden');
                mudarIdioma(window.idiomaAtual);
            } else { 
                errLabel.innerText = linguas[window.idiomaAtual].erroLogin;
                errLabel.classList.remove('hidden'); 
            }
        });
    }

    function fazerLogout() {
        window.operadorLogado = null;
        document.getElementById('loginScreen').classList.remove('hidden');
        cancelarModoEdicao();
    }

    function salvarJogoNoFirebase() {
        if (!window.operadorLogado) return;

        const keyExistente = document.getElementById('editGameKey').value;
        const liga = document.getElementById('liga').value.trim() || "Liga";
        const dataEvento = document.getElementById('dataEvento').value; // Retorna string YYYY-MM-DD
        const equipaA = document.getElementById('equipaA').value.trim();
        const equipaB = document.getElementById('equipaB').value.trim();

        if (!equipaA || !equipaB) { alert(linguas[window.idiomaAtual].avisoCampos); return; }

        const jogo = {
            operador: window.operadorLogado.username, 
            liga: liga, 
            dataEvento: dataEvento, // Guardado de forma simples e direta
            equipaA: equipaA, 
            equipaB: equipaB,
            gmA: Number(document.getElementById('gmA').value), gsA: Number(document.getElementById('gsA').value),
            vA: Number(document.getElementById('vA').value), eA: Number(document.getElementById('eA').value), dA: Number(document.getElementById('dA').value),
            vA_casa: Number(document.getElementById('vA_casa').value), eA_casa: Number(document.getElementById('eA_casa').value), dA_casa: Number(document.getElementById('dA_casa').value),
            gmB: Number(document.getElementById('gmB').value), gsB: Number(document.getElementById('gsB').value),
            vB: Number(document.getElementById('vB').value), eB: Number(document.getElementById('eB').value), dB: Number(document.getElementById('dB').value),
            vB_fora: Number(document.getElementById('vB_fora').value), eB_fora: Number(document.getElementById('eB_fora').value), dB_fora: Number(document.getElementById('dB_fora').value),
            criadoEm: keyExistente ? window.dadosJogosGlobais[keyExistente].criadoEm : new Date().getTime() // Data automática de registo
        };

        if (keyExistente) {
            window.dbSet(window.dbRef(window.db, `jogos/${keyExistente}`), jogo).then(() => {
                alert(linguas[window.idiomaAtual].sucessoEdit);
                cancelarModoEdicao();
            });
        } else {
            window.dbPush(window.dbRef(window.db, "jogos"), jogo).then(() => {
                alert(linguas[window.idiomaAtual].sucessoAdd);
                resetFormulario();
            });
        }
    }

    function carregarJogoParaEdicao(key) {
        const j = window.dadosJogosGlobais[key];
        if(!j) return;

        document.getElementById('editGameKey').value = key;
        document.getElementById('liga').value = j.liga;
        document.getElementById('dataEvento').value = j.dataEvento || ""; // Carrega a data de volta para o seletor do operador
        document.getElementById('equipaA').value = j.equipaA; document.getElementById('equipaB').value = j.equipaB;
        document.getElementById('gmA').value = j.gmA; document.getElementById('gsA').value = j.gsA;
        document.getElementById('vA').value = j.vA; document.getElementById('eA').value = j.eA; document.getElementById('dA').value = j.dA;
        document.getElementById('vA_casa').value = j.vA_casa; document.getElementById('eA_casa').value = j.eA_casa; document.getElementById('dA_casa').value = j.dA_casa;
        document.getElementById('gmB').value = j.gmB; document.getElementById('gsB').value = j.gsB;
        document.getElementById('vB').value = j.vB; document.getElementById('eB').value = j.eB; document.getElementById('dB').value = j.dB;
        document.getElementById('vB_fora').value = j.vB_fora; document.getElementById('eB_fora').value = j.eB_fora; document.getElementById('dB_fora').value = j.dB_fora;

        document.getElementById('alertaEdicao').classList.remove('hidden');
        const btn = document.getElementById('btnSalvarPrincipal');
        btn.innerText = linguas[window.idiomaAtual].btnSalvarEdit;
        btn.className = "btn-warning";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarModoEdicao() {
        document.getElementById('editGameKey').value = "";
        document.getElementById('alertaEdicao').classList.add('hidden');
        const btn = document.getElementById('btnSalvarPrincipal');
        btn.innerText = linguas[window.idiomaAtual].btnSalvarPrincipal;
        btn.className = "btn-add";
        resetFormulario();
    }

    window.atualizarListasInterface = function() {
        const divTodos = document.getElementById('listaTodosJogos');
        const divMeus = document.getElementById('listaMeusJogos');
        
        let arrJogos = Object.keys(window.dadosJogosGlobais).map(key => ({
            key: key, ...window.dadosJogosGlobais[key]
        })).sort((a,b) => b.criadoEm - a.criadoEm);

        let meusContador = arrJogos.filter(j => j.operador === window.operadorLogado.username).length;
        
        document.getElementById('tabBtnTodos').innerHTML = `${linguas[window.idiomaAtual].tabBtnTodos} (<span id="countTodos">${arrJogos.length}</span>)`;
        document.getElementById('tabBtnMeus').innerHTML = `${linguas[window.idiomaAtual].tabBtnMeus} (<span id="countMeus">${meusContador}</span>)`;

        divTodos.innerHTML = ''; divMeus.innerHTML = '';

        if(arrJogos.length === 0) return;

        arrJogos.forEach(j => {
            const eMeuJogo = j.operador === window.operadorLogado.username;
            const l = linguas[window.idiomaAtual];
            
            const htmlCard = `
                <div class="game-card">
                    <div class="game-header ${eMeuJogo ? 'my-game' : ''}">
                        <span>🏆 LIGA: ${j.liga}</span>
                        <span>👤 OP: @${j.operador} ${eMeuJogo ? '(Tu)' : ''}</span>
                    </div>
                    <!-- Barra visual exibindo as duas datas distintas -->
                    <div class="game-dates-bar">
                        <span>📅 ${l.lblDataEventoCard}: <strong>${formatarDataString(j.dataEvento)}</strong></span>
                        <span>⏱️ ${l.lblDataInsercaoCard}: ${formatarTimestamp(j.criadoEm)}</span>
                    </div>
                    <div class="game-body">
                        <div class="game-team-col">
                            <h4>${j.equipaA}</h4>
                            <table class="mini-table">
                                <tr><td>${l.lblTabelaGolos}</td><td>${j.gmA}/${j.gsA}</td></tr>
                                <tr><td>${l.lblTabelaTotais}</td><td>${j.vA}/${j.eA}/${j.dA}</td></tr>
                                <tr><td>${l.lblTabelaLocal}</td><td>${j.vA_casa}/${j.eA_casa}/${j.dA_casa}</td></tr>
                            </table>
                        </div>
                        <div class="vs-col">VS</div>
                        <div class="game-team-col">
                            <h4>${j.equipaB}</h4>
                            <table class="mini-table">
                                <tr><td>${l.lblTabelaGolos}</td><td>${j.gmB}/${j.gsB}</td></tr>
                                <tr><td>${l.lblTabelaTotais}</td><td>${j.vB}/${j.eB}/${j.dB}</td></tr>
                                <tr><td>${l.lblTabelaVisitante}</td><td>${j.vB_fora}/${j.eB_fora}/${j.dB_fora}</td></tr>
                            </table>
                        </div>
                    </div>
                    ${eMeuJogo ? `<div style="padding:0 15px 10px; text-align:right;"><button class="btn-edit-inline" onclick="carregarJogoParaEdicao('${j.key}')">${l.btnEditarInline}</button></div>` : ''}
                </div>
            `;

            divTodos.innerHTML += htmlCard;
            if(eMeuJogo) divMeus.innerHTML += htmlCard;
        });
    }

    window.atualizarBuscaAutomaticaLigas = function(ligas) {
        const datalist = document.getElementById('ligas-existentes');
        if(!datalist) return; datalist.innerHTML = '';
        ligas.forEach(l => datalist.innerHTML += `<option value="${l}">`);
    }

    function resetFormulario() {
        document.getElementById('editGameKey').value = '';
        document.getElementById('liga').value = '';
        document.getElementById('dataEvento').value = ''; // Limpa o campo de data do evento
        document.getElementById('equipaA').value = ''; document.getElementById('equipaB').value = '';
        document.querySelectorAll('.stats-vertical input').forEach(i => i.value = '0');
    }
</script>

</body>
</html>
